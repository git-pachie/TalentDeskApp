name: ClientRegistrationApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.example.ClientRegistrationApp
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  ClientRegistrationApp:
    type: application
    platform: iOS
    sources:
      - path: ClientRegistrationApp
        excludes:
          - Preview Content
    resources:
      - ClientRegistrationApp/Resources
      - ClientRegistrationApp/Preview Content
    settings:
      base:
        INFOPLIST_FILE: ClientRegistrationApp/Info.plist
        PRODUCT_NAME: ClientRegistrationApp
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: R3F22UC8DK
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    scheme:
      testTargets: []
