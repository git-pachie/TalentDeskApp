name: GroceryApp
options:
  bundleIdPrefix: com.grocery
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.grocery.GroceryApp
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  GroceryApp:
    type: application
    platform: iOS
    sources:
      - path: GroceryApp
        excludes:
          - Preview Content
    resources:
      - GroceryApp/Resources
      - GroceryApp/Preview Content
    settings:
      base:
        INFOPLIST_FILE: GroceryApp/Info.plist
        PRODUCT_NAME: GroceryApp
        TARGETED_DEVICE_FAMILY: 1,2
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    scheme:
      testTargets: []
